name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Each operating system compiles a different provider adapter, so a single
  # leg proves nothing about the other two.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      # -race is the point of this job: the hub, the lifecycle tracker, and the
      # fixed clock are all built to be driven from several goroutines at once.
      - run: go test -race ./...

  coverage:
    name: coverage gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # macOS is the leg where the corelocation tests compile, so the gate runs
      # against the largest set of packages. scripts/cover.sh owns the floor
      # and the native-adapter exclusions.
      - run: ./scripts/cover.sh

  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The adapters for the other two operating systems are invisible to a
      # single-OS build, and would otherwise rot until someone tried to ship on
      # that platform.
      - run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
