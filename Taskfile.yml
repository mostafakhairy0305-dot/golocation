---
version: "3"
vars:
    # Global, not task-level: a task-level var would outrank the same name given
    # on the command line, which would silently ignore GOOS_LIST=... overrides.
    GOOS_LIST: "linux windows darwin"
includes:
    go:
        taskfile: taskfiles/go/Taskfile.yml
        vars:
            INSTALL_DIR_UNIX: "/usr/local"
            GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
            GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
            GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
            GO_VERSION_URL: https://go.dev/VERSION?m=text
            GO_DOWNLOAD_BASE_URL: https://go.dev/dl
            # Empty on purpose: macOS installs Go through Homebrew, and any value
            # here switches to the official .pkg installer instead (sudo, over the
            # top of the brew install). CI pins Go via go-version-file in
            # .github/actions/setup, not from here. A value must be go-prefixed,
            # e.g. go1.26.5 — a bare 1.26.5 fails the format precondition.
            GO_VERSION: "v1.26.5"
            # Pinned, not floating: an empty value resolves to @latest, so CI
            # installs today's release while a developer machine keeps whatever
            # binary it already has. Same input, different findings.
            GOLANGCI_LINT_VERSION: "v2.12.2"
            GOVULNCHECK_VERSION: "v1.6.0"
            GOSEC_VERSION: "v2.28.0"
            GLOBAL_GO_BIN:
                sh: |
                    gobin="${GOBIN:-}"
                    if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
                      gobin="$(go env GOBIN)"
                    fi
                    if [ -z "$gobin" ]; then
                      gopath="${GOPATH:-}"
                      if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
                        gopath="$(go env GOPATH)"
                      fi
                      gobin="${gopath:-$HOME/go}/bin"
                    fi
                    printf '%s' "$gobin"
    staticcheck:
        taskfile: taskfiles/staticcheck/Taskfile.yml
        vars:
            STATICCHECK_VERSION: "2026.1"
            STATICCHECK_RELEASE_BASE_URL: https://github.com/dominikh/go-tools/releases/download
            GLOBAL_GO_BIN:
                sh: |
                    gobin="$(go env GOBIN)"
                    if [ -z "$gobin" ]; then
                      gobin="$(go env GOPATH)/bin"
                    fi
                    printf '%s' "$gobin"
    actionlint:
        taskfile: taskfiles/actionlint/Taskfile.yml
        vars:
            ACTIONLINT_VERSION: "1.7.12"
            ACTIONLINT_EXTRA_ARGS: ""
            ACTIONLINT_TARGETS: ""
    yamllint:
        taskfile: taskfiles/yamllint/Taskfile.yml
        vars:
            UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
            TARGETS: "."
            CONFIG: ""
            EXTRA_ARGS: ""
            YAMLLINT_VERSION: "1.38.0"
            YAMLFIX_VERSION: "1.19.1"
    zizmor:
        taskfile: taskfiles/zizmor/Taskfile.yml
        vars:
            ZIZMOR_EXTRA_ARGS: "--offline"
            ZIZMOR_TARGETS: ".github"
            ZIZMOR_VERSION: "1.27.0"
    shellcheck:
        taskfile: taskfiles/shellcheck/Taskfile.yml
        vars:
            EXTRA_ARGS: ""
            TARGETS: ""
            # Deliberately unpinned. ShellCheck installs from the platform package
            # manager, so a version here becomes brew shellcheck@X (no such
            # formula) or apt shellcheck=X (Ubuntu ships its own revision string).
            # Pinning the number would break the install on both.
            VERSION: ""
    adrs:
        taskfile: taskfiles/adrs/Taskfile.yml
        vars:
            CARGO_BIN_UNIX: "$HOME/.cargo/bin"
            EXTRA_ARGS: ""
            ADRS_VERSION: "0.10.0"
tasks:
    ci:
        desc: Run Ci checks
        cmds:
            - task: fmt:check
            - task: lint
            - task: test
            - task: test:race
            - task: vet
            - task: cover
            - task: crosscheck
    ci:fix:
        desc: Run Ci fixing
        cmds:
            - task: fmt
            - task: lint:fix
    lint:
        run: once
        desc: Run every lint check from the included taskfiles
        summary: |
            Fan out to the lint tasks of all included taskfiles: Go (golangci-lint,
            formatters, govulncheck, gosec), staticcheck, actionlint, yamllint,
            zizmor, and shellcheck.
        deps:
            - go:lint
            - staticcheck:lint
            - actionlint:lint
            - yamllint:lint
            - zizmor:lint
            - shellcheck:lint
    lint:fix:
        run: once
        desc: Auto-fix lint issues across the included taskfiles
        summary: |
            Run the auto-fixing lint tasks of the included taskfiles: golangci-lint
            --fix plus Go formatters, and yamlfix for YAML files. Tools without a
            fix mode (staticcheck, actionlint, zizmor, shellcheck) are skipped;
            run lint to see their findings.
        cmds:
            - task: go:lint:fix
            - task: yamllint:lint:fix
    fmt:
        run: once
        desc: Format sources across the included taskfiles
        summary: |
            Rewrite files with the formatters of the included taskfiles: Go files via
            golangci-lint formatters and YAML files via yamlfix.
        cmds:
            - task: go:fmt
            - task: yamllint:lint:fix
    fmt:check:
        run: once
        desc: Check formatting across the included taskfiles without writing
        summary: |
            Verify formatting without modifying files: Go files via golangci-lint
            formatters and YAML files via yamllint. Use fmt to apply fixes.
        deps:
            - go:fmt:check
            - yamllint:lint
    test:
        run: once
        desc: Run the Go test suite (TARGET=./...)
        summary: |
            Run go test against TARGET (default ./...). Pass CLI arguments
            after -- to override the target or add flags, for example
            task test -- -run TestOpen ./geo.
        cmds:
            - >-
              go test {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{default "./..." .TARGET}}{{end}}
    test:race:
        run: once
        aliases: [race]
        desc: Run the Go test suite under the race detector (TARGET=./...)
        summary: |
            The hub, the lifecycle tracker, and the fixed clock are all driven
            from several goroutines at once, so -race is what makes this run
            worth its extra time. Pass CLI arguments after -- to override the
            target.
        cmds:
            - >-
              go test -race {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{default "./..." .TARGET}}{{end}}
    vet:
        run: once
        desc: Vet the module for the host operating system (TARGET=./...)
        summary: |
            Run go vet against TARGET (default ./...). Use crosscheck to vet the
            operating systems this host does not compile.
        cmds:
            - >-
              go vet {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{default "./..." .TARGET}}{{end}}
    crosscheck:
        run: once
        desc: Vet the module for every supported operating system
        summary: |
            The three native adapters compile only on their own operating
            system, so a host-only vet says nothing about two thirds of the
            provider feature. Override the list with GOOS_LIST="linux darwin".
        cmds:
            - for: {var: GOOS_LIST}
              cmd: GOOS={{.ITEM}} go vet {{default "./..." .TARGET}}
    cover:
        run: once
        desc: Run the per-package coverage gate (COVERAGE_THRESHOLD=100)
        summary: |
            scripts/cover.sh owns the floor and the native-adapter exclusions,
            and CI runs the same script. Relax the floor for a single run with
            task cover COVERAGE_THRESHOLD=90.
        env:
            COVERAGE_THRESHOLD: "{{.COVERAGE_THRESHOLD}}"
        cmds:
            - ./scripts/cover.sh
    cover:html:
        run: once
        aliases: [cover-html]
        desc: Run the coverage gate and write cover.html for local drill-down
        summary: |
            Same gate as cover, plus an HTML report at cover.html. The gate
            still fails the task when a package is below the floor.
        env:
            COVERAGE_THRESHOLD: "{{.COVERAGE_THRESHOLD}}"
        cmds:
            - ./scripts/cover.sh --html
