version: "3"
includes:
    go:
        taskfile: taskfiles/go/Taskfile.yml
        vars:
            INSTALL_DIR_UNIX: "/usr/local"
            GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
            GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
            GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
            GO_VERSION_URL: https://go.dev/VERSION?m=text
            GO_DOWNLOAD_BASE_URL: https://go.dev/dl
            GO_VERSION: ""
            GOLANGCI_LINT_VERSION: ""
            GOVULNCHECK_VERSION: ""
            GOSEC_VERSION: ""
            GLOBAL_GO_BIN:
                sh: |
                    gobin="${GOBIN:-}"
                    if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
                      gobin="$(go env GOBIN)"
                    fi
                    if [ -z "$gobin" ]; then
                      gopath="${GOPATH:-}"
                      if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
                        gopath="$(go env GOPATH)"
                      fi
                      gobin="${gopath:-$HOME/go}/bin"
                    fi
                    printf '%s' "$gobin"
    staticcheck:
        taskfile: taskfiles/staticcheck/Taskfile.yml
        vars:
            STATICCHECK_VERSION: "2026.1"
            STATICCHECK_RELEASE_BASE_URL: https://github.com/dominikh/go-tools/releases/download
            GLOBAL_GO_BIN:
                sh: |
                    gobin="$(go env GOBIN)"
                    if [ -z "$gobin" ]; then
                      gobin="$(go env GOPATH)/bin"
                    fi
                    printf '%s' "$gobin"
    actionlint:
        taskfile: taskfiles/actionlint/Taskfile.yml
        vars:
            ACTIONLINT_VERSION: "1.7.12"
            ACTIONLINT_EXTRA_ARGS: ""
            ACTIONLINT_TARGETS: ""
    yamllint:
        taskfile: taskfiles/yamllint/Taskfile.yml
        vars:
            UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
            TARGETS: "."
            CONFIG: ""
            EXTRA_ARGS: ""
            YAMLLINT_VERSION: ""
            YAMLFIX_VERSION: ""
    zizmor:
        taskfile: taskfiles/zizmor/Taskfile.yml
        vars:
            ZIZMOR_EXTRA_ARGS: "--offline"
            ZIZMOR_TARGETS: ".github"
            ZIZMOR_VERSION: "1.25.2"
    shellcheck:
        taskfile: taskfiles/shellcheck/Taskfile.yml
        vars:
            EXTRA_ARGS: ""
            TARGETS: ""
            VERSION: ""
    adrs:
        taskfile: taskfiles/adrs/Taskfile.yml
        vars:
            CARGO_BIN_UNIX: "$HOME/.cargo/bin"
            EXTRA_ARGS: ""
            ADRS_VERSION: ""
