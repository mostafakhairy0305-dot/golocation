---
version: '2'
run:
  timeout: 10m
linters:
  default: all
  disable: [wsl, gomodguard]
  enable: [gomodguard_v2]
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $gostd
            - github.com/mostafakhairy0305-dot/golocation
            # The CoreLocation backend calls into Objective-C through purego.
            - github.com/ebitengine/purego
            # Lazy, retryable process-local singletons: owns the once-only
            # close and stop guards in the core Service and the native adapters.
            - github.com/mostafakhairy0305-dot/singleton
          deny:
            - pkg: math/rand
              desc: use math/rand/v2
    ireturn:
      allow: [error, empty, anon, stdlib, generic]
    cyclop:
      max-complexity: 5
      package-average: 5.0
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    varnamelen:
      # Conventional short names that are clearer than a verbose alternative.
      ignore-names: [tx, db, id, ok]
    tagalign:
      order: [json, exhaustruct]
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
